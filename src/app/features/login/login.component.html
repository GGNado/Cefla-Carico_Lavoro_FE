<div class="login-page">
  <div class="login-page__bg"></div>

  <div class="login-container">
    <div class="login-brand">
      <div class="login-brand__icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <h1 class="login-brand__title">CCS Workload Manager</h1>
      <p class="login-brand__sub">Gestione efficiente dei carichi di lavoro</p>
    </div>

    <div class="login-card">
      <h2 class="login-card__title">Accedi</h2>
      <p class="login-card__sub">Inserisci le tue credenziali per continuare</p>

      <form (ngSubmit)="onSubmit()" #f="ngForm" class="login-form">
        <div class="form-group">
          <label class="form-label" for="login-username">Email o Username</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              id="login-username"
              class="form-control"
              type="text"
              placeholder="nome@azienda.it"
              [(ngModel)]="usernameOrEmail"
              name="usernameOrEmail"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group">
          <div class="flex justify-between items-center">
            <label class="form-label" for="login-password">Password</label>
            <a href="#" class="login-forgot" tabindex="-1">Password dimenticata?</a>
          </div>
          <div class="input-icon-wrap" style="position:relative;">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="login-password"
              class="form-control"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              style="padding-right: 40px;"
            />
            <button type="button" class="login-eye" (click)="togglePassword()" id="login-toggle-password">
              @if (showPassword()) {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        @if (errorMsg()) {
          <div class="alert alert-error" role="alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ errorMsg() }}
          </div>
        }

        <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading()" id="login-submit-btn">
          @if (loading()) {
            <span class="login-spinner"></span>
            Accesso in corso...
          } @else {
            Accedi
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          }
        </button>
      </form>

      <p class="login-register">
        Non hai un account? <a href="mailto:admin@cefla.it" class="text-primary font-semibold">Contatta l'amministratore</a>
      </p>
    </div>
  </div>
</div>
