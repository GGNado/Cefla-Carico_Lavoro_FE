<header class="header">
  <div class="header__title">{{ pageTitle() }}</div>
  <div class="header__right">
    <button class="header__icon-btn" title="Notifiche" id="header-notifications-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
    @if (auth.currentUser(); as user) {
      <div class="header__user">
        <div class="avatar" style="background: #3B3BF9; width:32px; height:32px; font-size:12px;">
          {{ user.firstName[0] }}{{ user.lastName[0] }}
        </div>
        <div class="header__user-info">
          <span class="header__user-name">{{ user.firstName }} {{ user.lastName }}</span>
          <span class="header__user-role">{{ user.roles[0].replace('ROLE_', '') | titlecase }}</span>
        </div>
        <button class="header__icon-btn" (click)="logout()" title="Logout" id="header-logout-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    }
  </div>
</header>
